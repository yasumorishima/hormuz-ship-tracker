<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strait of Hormuz — Live Ship Tracker & Analytics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; }

        /* ── Header ── */
        #header {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a4a;
            height: 52px;
        }
        #header h1 { font-size: 17px; font-weight: 600; }
        #header h1 span { color: #4fc3f7; }
        #header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .header-stat {
            text-align: center;
        }
        .header-stat .val { font-size: 18px; font-weight: 700; color: #4fc3f7; }
        .header-stat .lbl { font-size: 10px; color: #888; text-transform: uppercase; }

        /* ── Transit counter in header ── */
        .transit-counter {
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 4px 14px;
            border: 1px solid #2a3a4a;
        }
        .transit-dir {
            text-align: center;
        }
        .transit-dir .num {
            font-size: 20px;
            font-weight: 800;
        }
        .transit-dir .arrow-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .transit-in .num { color: #4caf50; }
        .transit-in .arrow-label { color: #66bb6a; }
        .transit-out .num { color: #ff9800; }
        .transit-out .arrow-label { color: #ffb74d; }
        .transit-sep {
            width: 1px;
            height: 30px;
            background: #2a3a4a;
        }
        .transit-period {
            font-size: 9px;
            color: #666;
            text-transform: uppercase;
        }

        /* ── Main layout ── */
        #main {
            display: flex;
            height: calc(100vh - 52px);
        }
        #map-container {
            flex: 1;
            position: relative;
        }
        #map { height: 100%; width: 100%; }

        /* ── Sidebar ── */
        #sidebar {
            width: 340px;
            background: #0d1b2a;
            border-left: 1px solid #2a3a4a;
            overflow-y: auto;
            transition: width 0.3s;
        }
        #sidebar.collapsed { width: 0; overflow: hidden; }
        #sidebar-toggle {
            position: absolute;
            right: 345px;
            top: 10px;
            z-index: 1000;
            background: #0d1b2aee;
            border: 1px solid #2a3a4a;
            color: #4fc3f7;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: right 0.3s;
        }
        #sidebar.collapsed ~ #sidebar-toggle { right: 5px; }

        .panel {
            padding: 14px 16px;
            border-bottom: 1px solid #1a2a3a;
        }
        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4fc3f7;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* ── Vessel states ── */
        .state-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .state-card {
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            padding: 8px 10px;
            text-align: center;
        }
        .state-card .num {
            font-size: 18px;
            font-weight: 700;
        }
        .state-card .lbl {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }
        .state-anchored .num { color: #fdd835; }
        .state-slow .num { color: #ff9800; }
        .state-maneuvering .num { color: #42a5f5; }
        .state-transiting .num { color: #66bb6a; }

        /* ── Chart container ── */
        .chart-container {
            height: 160px;
            position: relative;
        }

        /* ── List items ── */
        .rank-list {
            list-style: none;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .rank-item:last-child { border-bottom: none; }
        .rank-name { color: #ccc; }
        .rank-val {
            font-weight: 600;
            color: #4fc3f7;
            min-width: 30px;
            text-align: right;
        }
        .rank-bar {
            flex: 1;
            margin: 0 10px;
            height: 4px;
            background: #1a2a3a;
            border-radius: 2px;
            overflow: hidden;
        }
        .rank-bar-fill {
            height: 100%;
            background: #4fc3f7;
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* ── Anchorage zones ── */
        .zone-list {
            list-style: none;
        }
        .zone-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
        }
        .zone-name { color: #aaa; }
        .zone-count { color: #fdd835; font-weight: 600; }

        /* ── Recent transits ── */
        .transit-event {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 12px;
        }
        .transit-event:last-child { border-bottom: none; }
        .transit-event .dir {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 700;
            font-size: 10px;
            margin-right: 6px;
        }
        .dir-in { background: #1b5e20; color: #a5d6a7; }
        .dir-out { background: #e65100; color: #ffcc80; }
        .transit-event .vessel-name { color: #ccc; }
        .transit-event .time { color: #666; font-size: 11px; }

        /* ── Map overlays ── */
        .vessel-popup {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            line-height: 1.6;
        }
        .vessel-popup .name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .vessel-popup .type-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .type-tanker { background: #e65100; color: #fff; }
        .type-cargo { background: #1565c0; color: #fff; }
        .type-passenger { background: #2e7d32; color: #fff; }
        .type-fishing { background: #6a1b9a; color: #fff; }
        .type-military { background: #b71c1c; color: #fff; }
        .type-unknown { background: #424242; color: #fff; }
        .track-btn {
            margin-top: 6px;
            padding: 4px 12px;
            background: #1565c0;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .track-btn:hover { background: #1976d2; }

        .legend {
            background: rgba(10, 10, 26, 0.9);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.8;
            border: 1px solid #2a3a4a;
        }
        .legend-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        /* ── Color mode toggle ── */
        .color-toggle {
            position: absolute;
            top: 10px;
            left: 55px;
            z-index: 1000;
            background: #0d1b2aee;
            border: 1px solid #2a3a4a;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }
        .color-toggle:hover { color: #4fc3f7; border-color: #4fc3f7; }
        .color-toggle.active { color: #4fc3f7; border-color: #4fc3f7; }
    </style>
</head>
<body>
    <div id="header">
        <h1>Strait of Hormuz <span>Live Analytics</span></h1>
        <div class="transit-counter">
            <div class="transit-period">24h Strait<br>Transits</div>
            <div class="transit-sep"></div>
            <div class="transit-dir transit-in">
                <div class="num" id="transit-in">--</div>
                <div class="arrow-label">&#x2192; IN</div>
            </div>
            <div class="transit-dir transit-out">
                <div class="num" id="transit-out">--</div>
                <div class="arrow-label">OUT &#x2190;</div>
            </div>
        </div>
        <div id="header-stats">
            <div class="header-stat">
                <div class="val" id="vessel-count">--</div>
                <div class="lbl">Active</div>
            </div>
            <div class="header-stat">
                <div class="val" id="total-records">--</div>
                <div class="lbl">Records</div>
            </div>
        </div>
    </div>

    <div id="main">
        <div id="map-container">
            <div id="map"></div>
            <button class="color-toggle" id="color-mode-btn" title="Toggle vessel coloring">
                Color: Type
            </button>
        </div>
        <button id="sidebar-toggle" title="Toggle analytics panel">&#9776;</button>
        <div id="sidebar">
            <!-- Vessel States -->
            <div class="panel">
                <div class="panel-title">Vessel Status (Live)</div>
                <div class="state-grid">
                    <div class="state-card state-transiting">
                        <div class="num" id="st-transiting">--</div>
                        <div class="lbl">Transiting</div>
                    </div>
                    <div class="state-card state-anchored">
                        <div class="num" id="st-anchored">--</div>
                        <div class="lbl">Anchored</div>
                    </div>
                    <div class="state-card state-maneuvering">
                        <div class="num" id="st-maneuvering">--</div>
                        <div class="lbl">Maneuvering</div>
                    </div>
                    <div class="state-card state-slow">
                        <div class="num" id="st-slow">--</div>
                        <div class="lbl">Slow / Drift</div>
                    </div>
                </div>
            </div>

            <!-- Hourly Transit Chart -->
            <div class="panel">
                <div class="panel-title">Hourly Strait Transits</div>
                <div class="chart-container">
                    <canvas id="transit-chart"></canvas>
                </div>
            </div>

            <!-- Anchorage Zones -->
            <div class="panel">
                <div class="panel-title">Anchorage Zones</div>
                <ul class="zone-list" id="zone-list"></ul>
            </div>

            <!-- Top Flags -->
            <div class="panel">
                <div class="panel-title">Top Flag States (24h)</div>
                <ul class="rank-list" id="flag-list"></ul>
            </div>

            <!-- Top Destinations -->
            <div class="panel">
                <div class="panel-title">Top Destinations (24h)</div>
                <ul class="rank-list" id="dest-list"></ul>
            </div>

            <!-- Recent Transits -->
            <div class="panel">
                <div class="panel-title">Recent Strait Crossings</div>
                <div id="recent-transits"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script>
        // ── Config ──
        const TYPE_COLORS = {
            'Tanker': '#e65100',
            'Cargo': '#1565c0',
            'Passenger': '#2e7d32',
            'Fishing/Towing/Dredging': '#6a1b9a',
            'Military/Sailing/Pleasure': '#b71c1c',
            'HSC': '#00838f',
            'Unknown': '#616161',
            'Other': '#455a64',
            'WIG': '#f57f17',
        };
        const STATE_COLORS = {
            'anchored': '#fdd835',
            'slow': '#ff9800',
            'maneuvering': '#42a5f5',
            'transiting': '#66bb6a',
            'unknown': '#616161',
        };

        let colorMode = 'type'; // 'type' or 'state'
        let vesselData = [];
        let stateData = {};

        function getTypeColor(type) {
            for (const [key, color] of Object.entries(TYPE_COLORS)) {
                if (type && type.includes(key.split('/')[0])) return color;
            }
            return TYPE_COLORS['Unknown'];
        }

        function getTypeClass(type) {
            if (!type) return 'type-unknown';
            if (type.includes('Tanker')) return 'type-tanker';
            if (type.includes('Cargo')) return 'type-cargo';
            if (type.includes('Passenger')) return 'type-passenger';
            if (type.includes('Fishing')) return 'type-fishing';
            if (type.includes('Military')) return 'type-military';
            return 'type-unknown';
        }

        function getVesselColor(vessel) {
            if (colorMode === 'state') {
                const spd = vessel.speed;
                if (spd == null) return STATE_COLORS['unknown'];
                if (spd < 0.5) return STATE_COLORS['anchored'];
                if (spd < 3) return STATE_COLORS['slow'];
                if (spd < 8) return STATE_COLORS['maneuvering'];
                return STATE_COLORS['transiting'];
            }
            return getTypeColor(vessel.type);
        }

        // ── Map setup ──
        const map = L.map('map', {
            center: [26.0, 55.5],
            zoom: 7,
            zoomControl: true,
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19,
        }).addTo(map);

        // Monitoring BBOX
        L.rectangle([[22.0, 48.0], [30.5, 60.0]], {
            color: '#4fc3f7', weight: 1.5, dashArray: '8 4',
            fill: false, interactive: false, opacity: 0.4,
        }).addTo(map);

        let markers = L.layerGroup().addTo(map);
        let trackLayer = L.layerGroup().addTo(map);
        let gateLayer = L.layerGroup().addTo(map);
        let zoneLayer = L.layerGroup().addTo(map);

        // Legend
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<div class="legend-title">Vessel Types</div>';
            for (const [type, color] of Object.entries(TYPE_COLORS)) {
                if (type === 'WIG') continue;
                div.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${type}</div>`;
            }
            return div;
        };
        legend.addTo(map);

        // ── Gate line & zones overlay ──
        async function loadGateAndZones() {
            try {
                const res = await fetch('/api/analytics/gate');
                const data = await res.json();

                gateLayer.clearLayers();
                zoneLayer.clearLayers();

                // Gate line
                const gate = data.gate;
                const gateLine = L.polyline(
                    [[gate.a.lat, gate.a.lon], [gate.b.lat, gate.b.lon]],
                    { color: '#ff1744', weight: 3, dashArray: '10 6', opacity: 0.9 }
                );
                gateLine.bindTooltip('Strait Gate Line (Transit Detection)', {
                    permanent: false, className: 'gate-tooltip',
                });
                gateLayer.addLayer(gateLine);

                // Gate endpoints
                [gate.a, gate.b].forEach(pt => {
                    gateLayer.addLayer(L.circleMarker([pt.lat, pt.lon], {
                        radius: 5, fillColor: '#ff1744', color: '#fff',
                        weight: 1, fillOpacity: 0.9,
                    }));
                });

                // Direction labels
                const midLat = (gate.a.lat + gate.b.lat) / 2;
                const midLon = (gate.a.lon + gate.b.lon) / 2;
                gateLayer.addLayer(L.marker([midLat + 0.15, midLon + 0.2], {
                    icon: L.divIcon({
                        html: '<div style="color:#4caf50;font-size:11px;font-weight:700;text-shadow:1px 1px 2px #000">&#x2192; INBOUND</div>',
                        className: '', iconSize: [80, 16],
                    }),
                    interactive: false,
                }));
                gateLayer.addLayer(L.marker([midLat - 0.15, midLon - 0.2], {
                    icon: L.divIcon({
                        html: '<div style="color:#ff9800;font-size:11px;font-weight:700;text-shadow:1px 1px 2px #000">OUTBOUND &#x2190;</div>',
                        className: '', iconSize: [80, 16],
                    }),
                    interactive: false,
                }));

                // Anchorage zones
                for (const [name, zone] of Object.entries(data.anchorage_zones)) {
                    const radiusMeters = zone.radius_nm * 1852;
                    const circle = L.circle([zone.lat, zone.lon], {
                        radius: radiusMeters,
                        color: '#fdd835',
                        weight: 1,
                        dashArray: '4 4',
                        fillColor: '#fdd835',
                        fillOpacity: 0.05,
                        interactive: true,
                    });
                    circle.bindTooltip(name, { sticky: true });
                    zoneLayer.addLayer(circle);
                }
            } catch (e) {
                console.error('Failed to load gate/zones:', e);
            }
        }

        // ── Vessel markers ──
        async function loadVessels() {
            try {
                const res = await fetch('/api/latest');
                const data = await res.json();
                vesselData = data.vessels;

                markers.clearLayers();
                data.vessels.forEach(v => {
                    const color = getVesselColor(v);
                    const marker = L.circleMarker([v.lat, v.lon], {
                        radius: v.type && v.type.includes('Tanker') ? 6 : 5,
                        fillColor: color,
                        color: '#fff',
                        weight: 1,
                        fillOpacity: 0.85,
                    });

                    const speedKnots = v.speed ? v.speed.toFixed(1) : '--';
                    const popup = `
                        <div class="vessel-popup">
                            <div class="name">${v.name}</div>
                            <span class="type-badge ${getTypeClass(v.type)}">${v.type}</span>
                            <br>
                            <strong>Speed:</strong> ${speedKnots} kn &nbsp;
                            <strong>Course:</strong> ${v.course ? v.course.toFixed(0) + '&deg;' : '--'}
                            <br>
                            <strong>Flag:</strong> ${v.flag || '--'} &nbsp;
                            <strong>MMSI:</strong> ${v.mmsi}
                            <br>
                            <strong>Dest:</strong> ${v.destination || '--'}
                            <br>
                            <strong>Size:</strong> ${v.length ? v.length + 'm' : '--'} x ${v.width ? v.width + 'm' : '--'}
                            <br>
                            <button class="track-btn" onclick="showTrack(${v.mmsi})">Show Track (6h)</button>
                        </div>
                    `;
                    marker.bindPopup(popup);
                    markers.addLayer(marker);
                });

                document.getElementById('vessel-count').textContent = data.count;

                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('total-records').textContent =
                    stats.total_records > 1000 ? (stats.total_records / 1000).toFixed(1) + 'K' : stats.total_records;

            } catch (e) {
                console.error('Failed to load vessels:', e);
            }
        }

        async function showTrack(mmsi) {
            try {
                trackLayer.clearLayers();
                const res = await fetch(`/api/tracks/${mmsi}?hours=6`);
                const data = await res.json();
                if (data.points.length < 2) return;

                const latlngs = data.points.map(p => [p.lat, p.lon]);
                L.polyline(latlngs, {
                    color: '#4fc3f7', weight: 2, opacity: 0.7, dashArray: '6 4',
                }).addTo(trackLayer);

                L.circleMarker(latlngs[0], {
                    radius: 4, fillColor: '#81c784', color: '#fff',
                    weight: 1, fillOpacity: 0.9,
                }).bindTooltip('Start').addTo(trackLayer);
            } catch (e) {
                console.error('Failed to load track:', e);
            }
        }

        // ── Analytics loading ──
        let transitChart = null;

        function initTransitChart() {
            const ctx = document.getElementById('transit-chart').getContext('2d');
            transitChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Inbound',
                            data: [],
                            backgroundColor: '#4caf50',
                            borderRadius: 2,
                        },
                        {
                            label: 'Outbound',
                            data: [],
                            backgroundColor: '#ff9800',
                            borderRadius: 2,
                        },
                    ],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { color: '#888', font: { size: 10 }, boxWidth: 12 },
                        },
                    },
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { color: '#555', font: { size: 9 }, maxRotation: 45 },
                            grid: { color: 'rgba(255,255,255,0.03)' },
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            ticks: { color: '#555', font: { size: 10 }, stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                        },
                    },
                },
            });
        }

        async function loadTransitData() {
            try {
                // Transit summary (header)
                const tRes = await fetch('/api/analytics/transits?hours=24');
                const tData = await tRes.json();
                document.getElementById('transit-in').textContent = tData.inbound;
                document.getElementById('transit-out').textContent = tData.outbound;

                // Recent events
                const recentDiv = document.getElementById('recent-transits');
                if (tData.recent_events.length === 0) {
                    recentDiv.innerHTML = '<div style="color:#555;font-size:12px;padding:8px 0">No transits detected yet. Data accumulating...</div>';
                } else {
                    recentDiv.innerHTML = tData.recent_events.slice(0, 8).map(e => {
                        const dirClass = e.direction === 'INBOUND' ? 'dir-in' : 'dir-out';
                        const timeStr = e.crossed_at ? new Date(e.crossed_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '--';
                        const name = e.ship_name || `MMSI:${e.mmsi}`;
                        return `<div class="transit-event">
                            <span class="dir ${dirClass}">${e.direction === 'INBOUND' ? 'IN' : 'OUT'}</span>
                            <span class="vessel-name">${name}</span>
                            ${e.speed ? `<span style="color:#666;margin-left:4px">${e.speed.toFixed(1)}kn</span>` : ''}
                            <span class="time" style="float:right">${timeStr}</span>
                        </div>`;
                    }).join('');
                }

                // Hourly chart
                const hRes = await fetch('/api/analytics/hourly?hours=48');
                const hData = await hRes.json();
                if (transitChart && hData.data.length > 0) {
                    transitChart.data.labels = hData.data.map(d => {
                        const dt = new Date(d.hour);
                        return dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    });
                    transitChart.data.datasets[0].data = hData.data.map(d => d.inbound);
                    transitChart.data.datasets[1].data = hData.data.map(d => d.outbound);
                    transitChart.update();
                }
            } catch (e) {
                console.error('Failed to load transit data:', e);
            }
        }

        async function loadVesselStates() {
            try {
                const res = await fetch('/api/analytics/states');
                stateData = await res.json();

                const s = stateData.states || {};
                document.getElementById('st-transiting').textContent = s.transiting || 0;
                document.getElementById('st-anchored').textContent = s.anchored || 0;
                document.getElementById('st-maneuvering').textContent = s.maneuvering || 0;
                document.getElementById('st-slow').textContent = s.slow || 0;

                // Anchorage zones
                const zl = document.getElementById('zone-list');
                const zones = stateData.zone_counts || {};
                if (Object.keys(zones).length === 0) {
                    zl.innerHTML = '<li style="color:#555;font-size:12px">No vessels in defined zones</li>';
                } else {
                    zl.innerHTML = Object.entries(zones).map(([name, cnt]) =>
                        `<li class="zone-item"><span class="zone-name">${name}</span><span class="zone-count">${cnt}</span></li>`
                    ).join('');
                }
            } catch (e) {
                console.error('Failed to load vessel states:', e);
            }
        }

        async function loadFlagData() {
            try {
                const res = await fetch('/api/analytics/flags?hours=24');
                const data = await res.json();
                const list = document.getElementById('flag-list');
                const items = data.data || [];
                if (items.length === 0) {
                    list.innerHTML = '<li style="color:#555;font-size:12px">No flag data available</li>';
                    return;
                }
                const maxVal = items[0].vessels;
                list.innerHTML = items.slice(0, 10).map(f =>
                    `<li class="rank-item">
                        <span class="rank-name">${f.flag}</span>
                        <div class="rank-bar"><div class="rank-bar-fill" style="width:${(f.vessels/maxVal*100).toFixed(0)}%"></div></div>
                        <span class="rank-val">${f.vessels}</span>
                    </li>`
                ).join('');
            } catch (e) {
                console.error('Failed to load flags:', e);
            }
        }

        async function loadDestData() {
            try {
                const res = await fetch('/api/analytics/destinations?hours=24');
                const data = await res.json();
                const list = document.getElementById('dest-list');
                const items = data.data || [];
                if (items.length === 0) {
                    list.innerHTML = '<li style="color:#555;font-size:12px">No destination data</li>';
                    return;
                }
                const maxVal = items[0].vessels;
                list.innerHTML = items.slice(0, 10).map(d =>
                    `<li class="rank-item">
                        <span class="rank-name">${d.destination}</span>
                        <div class="rank-bar"><div class="rank-bar-fill" style="width:${(d.vessels/maxVal*100).toFixed(0)}%"></div></div>
                        <span class="rank-val">${d.vessels}</span>
                    </li>`
                ).join('');
            } catch (e) {
                console.error('Failed to load destinations:', e);
            }
        }

        // ── Sidebar toggle ──
        document.getElementById('sidebar-toggle').addEventListener('click', () => {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
        });

        // ── Color mode toggle ──
        document.getElementById('color-mode-btn').addEventListener('click', () => {
            colorMode = colorMode === 'type' ? 'state' : 'type';
            const btn = document.getElementById('color-mode-btn');
            btn.textContent = colorMode === 'type' ? 'Color: Type' : 'Color: State';
            btn.classList.toggle('active', colorMode === 'state');
            loadVessels();
        });

        // ── Load everything ──
        async function loadAll() {
            await Promise.all([
                loadVessels(),
                loadTransitData(),
                loadVesselStates(),
                loadFlagData(),
                loadDestData(),
            ]);
        }

        initTransitChart();
        loadGateAndZones();
        loadAll();
        setInterval(loadAll, 30000);
    </script>
</body>
</html>
